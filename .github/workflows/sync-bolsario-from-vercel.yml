name: Sincronizar Bolsario do Vercel

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/sync-bolsario-from-vercel.yml

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Trazer arquivos publicados
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL "https://bolsario.vercel.app/index.html" -o index.html
          curl -fsSL "https://bolsario.vercel.app/styles.css" -o styles.css
          curl -fsSL "https://bolsario.vercel.app/app.js" -o app.js
          cat > README.md <<'EOF'
          # Bolsário: Controle Pessoal

          Aplicativo local para gerenciamento financeiro pessoal, feito para abrir direto no navegador.

          ## Como usar

          1. Abra `index.html` no navegador.
          2. Cadastre gastos e entradas no formulário.
          3. Use o filtro de mês para analisar períodos diferentes.
          4. Defina limites em "Orçamento por categoria".
          5. Ajuste nome, objetivo, renda, tema e categorias na aba "Perfil".
          6. Use o botão de exportação para baixar CSV e backup JSON.
          7. Use o botão de PDF para gerar um relatório do mês e salvar em "Imprimir > Salvar como PDF".

          Os dados ficam salvos no `localStorage` do navegador. Para levar para outro computador ou navegador, exporte o backup JSON e importe no novo ambiente.
          EOF
          sed -i 's/^          //' README.md
          rm -f .github/workflows/sync-bolsario-from-vercel.yml

      - name: Commitar ajustes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html styles.css app.js README.md .github/workflows/sync-bolsario-from-vercel.yml
          git commit -m "Ajustes de qualidade de vida" -m "Adiciona personalização por perfil, incluindo nome, objetivo, renda base, tema, cor e categorias próprias. Mantém o primeiro acesso zerado sem apagar dados reais no F5, preservando apenas uma migração dos antigos dados de demonstração. Atualiza exportações e relatório em PDF para refletirem o perfil configurado." || exit 0
          git push
